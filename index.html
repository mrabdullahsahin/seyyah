<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Türkiye'nin şehirlerini keşfetmek için sade, hızlı gezi rehberi.">
  <meta name="theme-color" content="#FAF8F4">
  <title>Seyyah — Türkiye'nin şehirlerini keşfet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <!--
    Leaflet harita kütüphanesi — yerel dosyalar gereklidir.
    İndirme: https://leafletjs.com/download.html
    → ZIP'i aç, şu dosyaları vendor/leaflet/ klasörüne koy:
        leaflet.js  ·  leaflet.css  ·  images/ (klasörün tamamı)
  -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ─── Üst Başlık ─────────────────────────────────── -->
    <header class="site-header" role="banner">
      <div class="container header-inner">
        <a href="#" class="logo" aria-label="Seyyah — Ana sayfa">
          <div class="logo-icon" id="logo-icon" aria-hidden="true"></div>
          <div class="logo-text">
            <span class="logo-name">Seyyah</span>
            <span class="logo-tagline" id="logo-tagline"></span>
          </div>
        </a>
        <div class="header-actions">
          <button class="btn-pill" id="btn-lang" aria-label="Dil değiştir / Switch language">
            <span id="lang-label">EN</span>
          </button>
          <button class="btn-pill" id="btn-theme" aria-label="Temayı değiştir">
            <span id="theme-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </header>

    <!-- ─── Ana İçerik ─────────────────────────────────── -->
    <main id="main" role="main">
      <!-- JavaScript tarafından dinamik olarak doldurulur -->
    </main>

  </div><!-- #app -->

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
